name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-24.04
    services:
      mysql:
        image: mysql:8.4.6
        env:
          MYSQL_DATABASE: tickets
          MYSQL_USER: tickets
          MYSQL_PASSWORD: tickets
          MYSQL_ROOT_PASSWORD: root-ci-only
        ports: [3306:3306]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot-ci-only --silent"
          --health-interval=5s --health-timeout=5s --health-retries=30
    env:
      DATABASE_URL: mysql://tickets:tickets@127.0.0.1:3306/tickets
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: tickets
      DB_PASSWORD: tickets
      DB_NAME: tickets
      BETTER_AUTH_SECRET: ci-secret-with-at-least-thirty-two-characters
      BETTER_AUTH_URL: http://localhost:3001
      MINIO_ACCESS_KEY: ci-minio
      MINIO_SECRET_KEY: ci-minio-secret
      PII_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      PII_HASH_KEY: ci-hash-secret-long-enough
      QR_SIGNING_SECRET: ci-qr-secret-long-enough
      RUN_INTEGRATION: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Instalar back-end
        working-directory: backend
        run: npm ci
      - name: Auditar dependências de produção do back-end
        working-directory: backend
        run: npm audit --omit=dev
      - name: Gerar Prisma e aplicar migrations
        working-directory: backend
        run: npm run prisma:generate && npm run prisma:deploy
      - name: Verificar back-end
        working-directory: backend
        run: npm run typecheck && npm run lint && npm test && npm run build
      - name: Gerar OpenAPI
        working-directory: backend
        run: npm run openapi:generate
      - name: Instalar e verificar front-end
        working-directory: frontend
        run: npm ci && npm audit --omit=dev && npm run api:generate && npm run lint && npm run build
      - name: Garantir contratos atualizados
        run: git diff --exit-code -- docs/openapi.json docs/auth-openapi.json frontend/src/lib/api/schema.d.ts
      - name: Validar Compose
        run: docker compose config --quiet
